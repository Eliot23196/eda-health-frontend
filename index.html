<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDA Health - Gestión Médica IA</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#1a6ef5', light: '#EBF2FF', dark: '#1558c8' },
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: #f5f6fa; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .sidebar-item-active { background-color: #EBF2FF; color: #1a6ef5; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Iconos (SVG Paths) ────────────────────────────────────── */
const icons = {
  dashboard: 'M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z',
  patients: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
  calendar: 'M3 4h18v18H3zM16 2v4M8 2v4M3 10h18',
  ai: 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z',
  settings: 'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z',
  plus: 'M12 5v14M5 12h14',
  check: 'M20 6L9 17l-5-5',
  x: 'M18 6L6 18M6 6l12 12'
};

const Icon = ({ name, size = 18, color = 'currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={icons[name]} />
  </svg>
);

/* ── Componentes Pequeños ───────────────────────────────────── */
const Badge = ({ label }) => {
  const styles = {
    Urgente: 'bg-red-50 text-red-700',
    Prioritario: 'bg-amber-50 text-amber-700',
    Normal: 'bg-emerald-50 text-emerald-700',
    Atendido: 'bg-gray-100 text-gray-500',
    Pendiente: 'bg-blue-50 text-blue-700'
  };
  return <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase ${styles[label] || styles.Normal}`}>{label}</span>;
};

/* ── Sidebar ────────────────────────────────────────────────── */
const Sidebar = ({ active, setActive }) => (
  <aside className="w-64 bg-white border-r border-gray-100 flex flex-col h-screen shrink-0">
    <div className="p-6 mb-4">
      <div className="flex items-center gap-3 text-brand font-bold text-xl">
        <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">E</div>
        <span>EDA Health</span>
      </div>
    </div>
    <nav className="flex-1 px-4 space-y-2">
      {[
        { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
        { id: 'pacientes', label: 'Pacientes', icon: 'patients' },
        { id: 'agenda', label: 'Agenda', icon: 'calendar' },
        { id: 'consulta', label: 'Consulta IA', icon: 'ai' },
        { id: 'ajustes', label: 'Ajustes', icon: 'settings' },
      ].map(item => (
        <button
          key={item.id}
          onClick={() => setActive(item.id)}
          className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition-all ${active === item.id ? 'sidebar-item-active shadow-sm' : 'text-gray-500 hover:bg-gray-50'}`}
        >
          <Icon name={item.icon} size={18} color={active === item.id ? '#1a6ef5' : '#9ca3af'} />
          {item.label}
        </button>
      ))}
    </nav>
    <div className="p-6 border-t border-gray-50">
      <div className="flex items-center gap-3">
        <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-brand font-bold">EL</div>
        <div>
          <p className="text-xs font-bold text-gray-800 leading-none">Eliot Lara R.</p>
          <p className="text-[10px] text-gray-400 mt-1 uppercase tracking-tighter">Senior Analyst</p>
        </div>
      </div>
    </div>
  </aside>
);

/* ── Vistas ─────────────────────────────────────────────────── */

const Dashboard = ({ patients }) => (
  <div className="p-8 flex-1 overflow-y-auto">
    <h1 className="text-2xl font-bold text-gray-800 mb-6">Panel de Control</h1>
    <div className="grid grid-cols-4 gap-6 mb-8">
      <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
        <p className="text-gray-400 text-xs font-bold uppercase mb-2">Citas Hoy</p>
        <p className="text-3xl font-black text-gray-800">{patients.length}</p>
      </div>
      <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm border-l-4 border-l-brand">
        <p className="text-gray-400 text-xs font-bold uppercase mb-2">Análisis IA</p>
        <p className="text-3xl font-black text-gray-800">24</p>
      </div>
    </div>
    <div className="bg-white rounded-2xl border border-gray-100 p-10 text-center">
      <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-brand">
        <Icon name="dashboard" size={32} />
      </div>
      <h3 className="text-lg font-bold text-gray-800">Integración Power BI</h3>
      <p className="text-gray-500 text-sm max-w-xs mx-auto mt-2">Aquí conectaremos tus reportes de DAX para visualizar la salud de tu clínica.</p>
    </div>
  </div>
);

const Pacientes = ({ patients }) => (
  <div className="p-8 flex-1 overflow-y-auto">
    <div className="flex justify-between items-center mb-6">
      <h1 className="text-2xl font-bold text-gray-800">Lista de Pacientes</h1>
      <button className="bg-brand text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
        <Icon name="plus" size={16} color="white" /> Nuevo Registro
      </button>
    </div>
    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
      <table className="w-full text-left text-sm">
        <thead className="bg-gray-50 border-b border-gray-100 text-gray-400 text-[10px] uppercase font-bold">
          <tr>
            <th className="px-6 py-4">Nombre</th>
            <th className="px-6 py-4">Edad</th>
            <th className="px-6 py-4">Prioridad</th>
            <th className="px-6 py-4">Estado</th>
          </tr>
        </thead>
        <tbody className="divide-y divide-gray-50">
          {patients.map(p => (
            <tr key={p.id} className="hover:bg-gray-50 transition-colors">
              <td className="px-6 py-4 font-bold text-gray-700">{p.name}</td>
              <td className="px-6 py-4 text-gray-500">{p.age} años</td>
              <td className="px-6 py-4"><Badge label={p.priority} /></td>
              <td className="px-6 py-4"><Badge label={p.status} /></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>
);

const ConsultaIA = () => {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([
    { role: 'assistant', text: 'Hola Dr. Lara. Describa los síntomas del paciente para realizar un análisis clínico con EDA Health.' }
  ]);
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const enviar = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: 'user', text: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch('https://backend-eda-final.onrender.com/consultar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto: input })
      });
      const data = await res.json();
      const respuestaIA = (data.respuesta || "No hay respuesta disponible").replace(/\*\*/g, '');
      setMessages(prev => [...prev, { role: 'assistant', text: respuestaIA }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', text: '⚠️ Error: No se pudo conectar con el servidor de Render.' }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50">
      <div className="p-6 bg-white border-b border-gray-100">
        <h1 className="text-xl font-bold text-gray-800">Asistente Clínico IA</h1>
        <p className="text-[10px] text-brand font-bold uppercase tracking-widest mt-1">Algoritmo de Triaje EDA-V1</p>
      </div>
      <div className="flex-1 overflow-y-auto p-6 space-y-4" ref={chatRef}>
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-[80%] px-4 py-3 rounded-2xl text-sm shadow-sm leading-relaxed ${m.role === 'user' ? 'bg-brand text-white rounded-br-none' : 'bg-white text-gray-700 border border-gray-100 rounded-bl-none'}`}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && <div className="text-xs text-gray-400 italic animate-pulse">EDA IA analizando síntomas...</div>}
      </div>
      <div className="p-6 bg-white border-t border-gray-100">
        <div className="flex gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-200">
          <input 
            className="flex-1 bg-transparent px-3 py-2 outline-none text-sm text-gray-700"
            placeholder="Ej: Paciente masculino de 45 años con dolor torácico..."
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && enviar()}
          />
          <button onClick={enviar} disabled={loading} className="bg-brand text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-brand-dark transition-all">
            Analizar
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── App Principal ─────────────────────────────────────────── */
const App = () => {
  const [active, setActive] = useState('consulta');
  const [patients] = useState([
    { id: 1, name: 'Ana García', age: 34, priority: 'Normal', status: 'Pendiente' },
    { id: 2, name: 'Carlos Mendoza', age: 52, priority: 'Urgente', status: 'Atendido' },
    { id: 3, name: 'María López', age: 28, priority: 'Normal', status: 'Pendiente' }
  ]);

  return (
    <div className="flex h-screen bg-gray-50 overflow-hidden font-sans">
      <Sidebar active={active} setActive={setActive} />
      <main className="flex-1 flex flex-col min-w-0">
        {active === 'dashboard' && <Dashboard patients={patients} />}
        {active === 'pacientes' && <Pacientes patients={patients} />}
        {active === 'consulta' && <ConsultaIA />}
        {active === 'agenda' && <div className="p-20 text-center text-gray-400">Próximamente: Integración con Smartsheet API</div>}
        {active === 'ajustes' && <div className="p-20 text-center text-gray-400">Configuración de Perfil EDA Analytics</div>}
        
        <footer className="p-4 bg-white border-t border-gray-100 text-center">
            <p className="text-[9px] text-gray-400 uppercase tracking-widest font-bold">
                Desarrollado por EDA Analytics & BI • Costa Rica 2026
            </p>
        </footer>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
