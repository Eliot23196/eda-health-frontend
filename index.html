<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDA Health - Gestión Médica IA</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { DEFAULT: '#1a6ef5', light: '#EBF2FF', dark: '#1558c8' } },
          fontFamily: { sans: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background: #f5f6fa; overflow: hidden; }
    .sidebar-item-active { background-color: #EBF2FF; color: #1a6ef5; font-weight: 600; }
    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Iconos SVG ── */
const Icon = ({ name }) => {
  const icons = {
    dashboard: 'M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z',
    patients: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z',
    calendar: 'M3 4h18v18H3zM16 2v4M8 2v4M3 10h18',
    ai: 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z',
    settings: 'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15'
  };
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d={icons[name] || ''} />
    </svg>
  );
};

/* ── Sección Dashboard ── */
const Dashboard = () => (
  <div className="p-10 animate-fadeIn">
    <h1 className="text-2xl font-bold text-gray-800 mb-6">Panel de Control</h1>
    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 border-l-4 border-l-brand">
        <p className="text-gray-400 text-xs font-bold uppercase">Pacientes Registrados</p>
        <p className="text-3xl font-black text-gray-800 mt-2">154</p>
      </div>
      <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p className="text-gray-400 text-xs font-bold uppercase">Consultas IA Hoy</p>
        <p className="text-3xl font-black text-brand mt-2">12</p>
      </div>
    </div>
  </div>
);

/* ── Sección Consulta IA ── */
const ConsultaIA = () => {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([
    { role: 'assistant', text: 'Bienvenido Dr. Lara. Describa los síntomas para el análisis clínico de hoy.' }
  ]);
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages]);

  const enviar = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: 'user', text: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);

    try {
      const res = await fetch('https://backend-eda-final.onrender.com/consultar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto: input })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      setMessages(prev => [...prev, { role: 'assistant', text: data.respuesta.replace(/\*\*/g, '') }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', text: '⚠️ El servidor está despertando. Reintente en 20 segundos.' }]);
    } finally { setLoading(false); }
  };

  return (
    <div className="flex-1 flex flex-col h-full bg-white shadow-inner">
      <div className="p-6 border-b border-gray-100 bg-white/80 backdrop-blur-md sticky top-0 z-10 flex justify-between items-center">
        <div>
          <h1 className="text-xl font-bold text-gray-800">Consulta Inteligente</h1>
          <p className="text-[10px] text-brand font-bold uppercase tracking-widest mt-1">EDA Health v1.5 Flash</p>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-6 space-y-4 chat-container" ref={chatRef}>
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-[80%] px-4 py-3 rounded-2xl text-sm shadow-sm ${m.role === 'user' ? 'bg-brand text-white rounded-br-none' : 'bg-gray-100 text-gray-700 rounded-bl-none'}`}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && <div className="text-xs text-brand animate-pulse font-bold">EDA IA procesando análisis clínico...</div>}
      </div>
      <div className="p-6 border-t border-gray-100">
        <div className="flex gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-200 focus-within:border-brand transition-all">
          <input 
            className="flex-1 bg-transparent px-3 py-2 outline-none text-sm text-gray-700"
            placeholder="Describa síntomas o consulta..."
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && enviar()}
          />
          <button onClick={enviar} disabled={loading} className="bg-brand text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-brand-dark transition-all disabled:opacity-50">Enviar</button>
        </div>
      </div>
    </div>
  );
};

/* ── App Principal ── */
const App = () => {
  const [active, setActive] = useState('consulta');

  return (
    <div className="flex h-screen w-full font-sans">
      <aside className="w-64 bg-white border-r border-gray-100 flex flex-col">
        <div className="p-8 text-brand font-bold text-2xl flex items-center gap-3">
          <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">E</div>
          <span>EDA Health</span>
        </div>
        <nav className="flex-1 px-4 space-y-1">
          {[
            { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
            { id: 'pacientes', label: 'Pacientes', icon: 'patients' },
            { id: 'agenda', label: 'Agenda', icon: 'calendar' },
            { id: 'consulta', label: 'Consulta IA', icon: 'ai' },
            { id: 'ajustes', label: 'Ajustes', icon: 'settings' }
          ].map(item => (
            <button key={item.id} onClick={() => setActive(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition-all ${active === item.id ? 'sidebar-item-active' : 'text-gray-400 hover:bg-gray-50'}`}>
              <Icon name={item.icon} /> {item.label}
            </button>
          ))}
        </nav>
        <div className="p-6 border-t border-gray-50 flex items-center gap-3">
          <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-brand font-bold text-xs">EL</div>
          <div>
            <p className="text-xs font-bold text-gray-800">Eliot Lara R.</p>
            <p className="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">Senior BI Analyst</p>
          </div>
        </div>
      </aside>

      <main className="flex-1 flex flex-col min-w-0 bg-gray-50">
        <div className="flex-1 overflow-hidden">
          {active === 'dashboard' && <Dashboard />}
          {active === 'consulta' && <ConsultaIA />}
          {['pacientes', 'agenda', 'ajustes'].includes(active) && (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
               <div className="p-4 bg-gray-100 rounded-full animate-pulse"><Icon name={active === 'agenda' ? 'calendar' : 'patients'} /></div>
               <p className="italic text-sm">Módulo de {active} en mantenimiento técnico.</p>
               <p className="text-[10px] font-bold uppercase text-brand tracking-widest">Integrando SQL & Smartsheet</p>
            </div>
          )}
        </div>
        <footer className="p-4 bg-white border-t border-gray-100 text-center">
            <p className="text-[9px] text-gray-400 uppercase tracking-widest font-bold">
                Desarrollado por EDA Analytics & BI • Costa Rica 2026
            </p>
        </footer>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
