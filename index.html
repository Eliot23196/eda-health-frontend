/* ── Consulta IA ─────────────────────────────────────────────── */
const ConsultaIA = () => {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState([
    { role: 'assistant', text: 'Hola, soy el Asistente IA de EDA Health. Describa los síntomas del paciente y le ayudaré con sugerencias de diagnóstico y triaje.' }
  ]);
  const [loading, setLoading] = useState(false);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: 'user', text: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);
    try {
      const res = await fetch('https://backend-eda.onrender.com/consultar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: input })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.respuesta || data.message || data.text || JSON.stringify(data);
      setMessages(prev => [...prev, { role: 'assistant', text: reply }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', text: `Error al conectar con el servidor: ${err.message}. Verifique que el backend esté activo en Render.` }]);
    }
    setLoading(false);
  };

  return (
    <div className="flex-1 flex flex-col bg-gray-50">
      <div className="px-7 py-5 border-b border-gray-100 bg-white">
        <h1 className="text-2xl font-bold text-gray-900">Consulta IA</h1>
        <p className="text-sm text-gray-500 mt-0.5">Análisis de síntomas y sugerencias de diagnóstico</p>
      </div>
      <div className="flex-1 overflow-y-auto p-7 flex flex-col gap-4">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            {m.role === 'assistant' && (
              <div className="w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white text-xs font-semibold mr-3 mt-1 shrink-0">IA</div>
            )}
            <div className={`max-w-xl rounded-2xl px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap
              ${m.role === 'user'
                ? 'bg-brand text-white rounded-br-sm'
                : 'bg-white border border-gray-100 text-gray-700 rounded-bl-sm'}`}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-start">
            <div className="w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white text-xs font-semibold mr-3 shrink-0">IA</div>
            <div className="bg-white border border-gray-100 rounded-2xl rounded-bl-sm px-4 py-3 text-sm text-gray-400">Analizando...</div>
          </div>
        )}
      </div>
      <div className="px-7 pb-7 pt-3 bg-gray-50">
        <div className="flex gap-3 bg-white rounded-2xl border border-gray-200 p-2 shadow-sm">
          <input
            className="flex-1 px-3 py-2 text-sm text-gray-800 bg-transparent outline-none placeholder-gray-400"
            placeholder="Describa síntomas, signos vitales o consulta clínica..."
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !e.shiftKey && send()}
          />
          <button
            onClick={send}
            disabled={loading || !input.trim()}
            className="bg-brand text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-brand-dark disabled:opacity-40 transition-colors"
          >
            Enviar
          </button>
        </div>
        <p className="text-xs text-gray-400 mt-2 text-center">Las sugerencias de IA no reemplazan el juicio clínico del médico.</p>
      </div>
    </div>
  );
};

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-3xl shadow-xl w-full max-w-lg">
        <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100">
          <div>
            <h2 className="text-lg font-bold text-gray-900">Nueva Consulta</h2>
            <p className="text-xs text-gray-400 mt-0.5">Complete los datos del paciente</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
            <Icon d={icons.x} size={15} stroke="#6b7280" />
          </button>
        </div>
        <div className="px-6 py-5 space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="text-xs font-medium text-gray-500 block mb-1.5">Nombre del paciente *</label>
              <input
                className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand"
                placeholder="Ej. Juan Pérez"
                value={form.name}
                onChange={e => set('name', e.target.value)}
              />
            </div>
            <div>
              <label className="text-xs font-medium text-gray-500 block mb-1.5">Edad</label>
              <input
                type="number"
                className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand"
                placeholder="Ej. 35"
                value={form.age}
                onChange={e => set('age', e.target.value)}
              />
            </div>
          </div>
          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1.5">Tipo de consulta</label>
            <select
              className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand bg-white"
              value={form.tipo}
              onChange={e => set('tipo', e.target.value)}
            >
              {['Consulta general', 'Revisión mensual', 'Control prenatal', 'Cardiología', 'Pediatría', 'Urgencias', 'Seguimiento'].map(t => (
                <option key={t}>{t}</option>
              ))}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="text-xs font-medium text-gray-500 block mb-1.5">Prioridad</label>
              <select
                className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand bg-white"
                value={form.priority}
                onChange={e => set('priority', e.target.value)}
              >
                {['Normal', 'Prioritario', 'Urgente'].map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-medium text-gray-500 block mb-1.5">Hora *</label>
              <input
                type="time"
                className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand"
                value={form.time}
                onChange={e => set('time', e.target.value)}
              />
            </div>
          </div>
          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1.5">Fecha</label>
            <input
              type="date"
              className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand"
              value={form.date}
              onChange={e => set('date', e.target.value)}
            />
          </div>
          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1.5">Notas clínicas</label>
            <textarea
              rows={3}
              className="w-full text-sm border border-gray-200 rounded-xl px-3 py-2.5 outline-none focus:border-brand resize-none"
              placeholder="Síntomas, motivo de consulta..."
              value={form.notes}
              onChange={e => set('notes', e.target.value)}
            />
          </div>
        </div>
        <div className="flex gap-3 px-6 pb-6">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 text-sm font-medium py-2.5 rounded-xl hover:bg-gray-50 transition-colors">
            Cancelar
          </button>
          <button onClick={handleSave} className="flex-1 bg-brand text-white text-sm font-medium py-2.5 rounded-xl hover:bg-brand-dark transition-colors flex items-center justify-center gap-2">
            <Icon d={icons.check} size={15} stroke="white" />
            Guardar consulta
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── App Root ────────────────────────────────────────────────── */
const App = () => {
  const [active, setActive] = useState('dashboard');
  const [patients, setPatients] = useState(initialPatients);
  const [showModal, setShowModal] = useState(false);

  const addPatient = (form) => {
    const nuevo = {
      id: Date.now(),
      name: form.name,
      age: parseInt(form.age) || 0,
      tipo: form.tipo,
      priority: form.priority,
      time: form.time,
      date: form.date,
      status: 'Pendiente',
    };
    setPatients(prev => [...prev, nuevo]);
  };

  const views = {
    dashboard: <Dashboard patients={patients} setActive={setActive} openNuevaConsulta={() => setShowModal(true)} />,
    pacientes: <Pacientes patients={patients} openNuevaConsulta={() => setShowModal(true)} />,
    agenda:    <Agenda patients={patients} openNuevaConsulta={() => setShowModal(true)} />,
    consulta:  <ConsultaIA />,
    ajustes:   <Ajustes />,
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar active={active} setActive={setActive} />
      {views[active]}
      {showModal && <ModalNuevaConsulta onClose={() => setShowModal(false)} onSave={addPatient} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
