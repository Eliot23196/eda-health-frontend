<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA Health - Consultoría IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .sidebar-item:hover { background-color: #f3f4f6; cursor: pointer; }
        .active-menu { background-color: #eff6ff; color: #2563eb; font-weight: 500; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="flex h-screen">
        <div class="w-64 bg-white border-r flex flex-col">
            <div class="p-6">
                <div class="flex items-center gap-2 text-blue-600 font-bold text-xl">
                    <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white text-xs">E</div>
                    EDA Health
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <div onclick="abrirSeccion('Dashboard')" class="sidebar-item p-3 rounded-lg flex items-center gap-3 text-gray-600">
                    <i class="fas fa-th-large w-5"></i> Dashboard
                </div>
                <div onclick="abrirSeccion('Pacientes')" class="sidebar-item p-3 rounded-lg flex items-center gap-3 text-gray-600">
                    <i class="fas fa-users w-5"></i> Pacientes
                </div>
                <div onclick="abrirSeccion('Agenda')" class="sidebar-item p-3 rounded-lg flex items-center gap-3 text-gray-600">
                    <i class="fas fa-calendar-alt w-5"></i> Agenda
                </div>
                <div class="sidebar-item p-3 rounded-lg active-menu flex items-center gap-3">
                    <i class="fas fa-comment-medical w-5"></i> Consulta IA
                </div>
                <div onclick="abrirSeccion('Ajustes')" class="sidebar-item p-3 rounded-lg flex items-center gap-3 text-gray-600">
                    <i class="fas fa-cog w-5"></i> Ajustes
                </div>
            </nav>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8">
                <h1 class="text-xl font-semibold text-gray-800">Consulta IA</h1>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500 font-medium">Dr. Eliot Lara</span>
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                        <i class="fas fa-user-md"></i>
                    </div>
                </div>
            </header>

            <main class="p-8 flex-1 overflow-hidden flex flex-col">
                <div id="chatBox" class="chat-container overflow-y-auto mb-4 space-y-4 pr-2">
                    <div class="flex gap-3">
                        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs">IA</div>
                        <div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm max-w-2xl text-gray-700">
                            Hola, soy el Asistente IA de EDA Health. Describa los síntomas del paciente y le ayudaré con sugerencias de diagnóstico y triaje.
                        </div>
                    </div>
                </div>

                <div class="bg-white border rounded-xl p-2 shadow-sm flex items-center gap-2">
                    <input type="text" id="userInput" placeholder="Describa síntomas, signos vitales o consulta clínica..." 
                           class="flex-1 p-3 focus:outline-none text-gray-700">
                    <button onclick="enviarConsulta()" id="btnEnviar" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-all flex items-center gap-2">
                        <span>Enviar</span>
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
                <p class="text-[10px] text-gray-400 mt-2 text-center uppercase tracking-wider">Uso exclusivo profesional - EDA Analytics 2026</p>
            </main>
        </div>
    </div>

    <script>
        // Función para los botones del menú que no abren
        function abrirSeccion(nombre) {
            alert(`La sección de ${nombre} se encuentra en mantenimiento técnico. Estamos integrando sus bases de datos.`);
        }

        async function enviarConsulta() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const btn = document.getElementById('btnEnviar');
            const texto = input.value.trim();

            if (!texto) return;

            // 1. Mostrar mensaje del usuario
            chatBox.innerHTML += `
                <div class="flex gap-3 justify-end">
                    <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none shadow-sm max-w-2xl">
                        ${texto}
                    </div>
                </div>
            `;
            
            input.value = '';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = '<span>Procesando...</span>';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 2. Conexión con el Backend en Render (URL Actualizada)
                const response = await fetch('https://backend-eda-final.onrender.com/consultar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                const data = await response.json();

                if (response.ok) {
                    // 3. Mostrar respuesta de la IA (Limpia los asteriscos de Markdown)
                    const respuestaLimpia = data.respuesta.replace(/\*\*/g, '').replace(/\n/g, '<br>');
                    chatBox.innerHTML += `
                        <div class="flex gap-3">
                            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs">IA</div>
                            <div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm max-w-2xl text-gray-800">
                                ${respuestaLimpia}
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error(data.detail || 'Error de conexión');
                }

            } catch (error) {
                chatBox.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-xs">!</div>
                        <div class="bg-red-50 border border-red-100 p-4 rounded-2xl rounded-tl-none text-red-700 text-sm max-w-2xl">
                            ${error.message}. Por favor, intente de nuevo en unos segundos.
                        </div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerHTML = '<span>Enviar</span> <i class="fas fa-paper-plane text-xs"></i>';
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Permitir enviar con la tecla Enter
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarConsulta();
        });
    </script>
</body>
</html>
